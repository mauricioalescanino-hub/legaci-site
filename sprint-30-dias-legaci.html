<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint 30 Dias · Legaci</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Bricolage+Grotesque:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#1A3C34;
  --copper:#C17F4A;
  --cream:#F8F6F2;
  --gold:#D4AF37;
  --ink:#111010;
  --ink2:rgba(17,16,16,0.75);
  --ink3:rgba(17,16,16,0.5);
  --border:rgba(17,16,16,0.08);
  --success:#2D7A4F;
  --warning:#D97706;
  --blue:#2563EB;
  --pink:#EC4899;
  --danger:#DC2626;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.6;
  min-height:100vh;
}

/* DEBUG PANEL */
#debugPanel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#1a1a1a;
  color:#0f0;
  padding:0.75rem 1rem;
  font-family:monospace;
  font-size:11px;
  max-height:150px;
  overflow-y:auto;
  border-top:2px solid #0f0;
  z-index:9999;
  display:none;
}

#debugPanel.visible{display:block}

#debugPanel .log-error{color:#ff5555}
#debugPanel .log-success{color:#55ff55}
#debugPanel .log-info{color:#aaa}

#debugToggle{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#1a1a1a;
  color:#0f0;
  border:1px solid #0f0;
  padding:0.5rem 1rem;
  border-radius:6px;
  cursor:pointer;
  font-family:monospace;
  font-size:12px;
  z-index:10000;
}

.header{
  background:linear-gradient(135deg, var(--forest), #0f231e);
  color:#fff;
  padding:2rem 1.5rem;
}

.header-content{max-width:1400px;margin:0 auto}

.header h1{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(24px, 4vw, 36px);
  margin-bottom:0.5rem;
}
.header h1 em{color:var(--gold);font-style:italic}
.header-sub{opacity:0.85;font-size:14px}

.user-switcher{
  display:flex;
  gap:0.5rem;
  background:rgba(255,255,255,0.1);
  padding:0.25rem;
  border-radius:10px;
  margin-top:1.5rem;
  max-width:max-content;
}

.user-btn{
  padding:0.6rem 1.2rem;
  background:transparent;
  color:#fff;
  border:none;
  border-radius:7px;
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  opacity:0.6;
  transition:all 0.2s;
}

.user-btn.active{background:var(--copper);opacity:1}
.user-btn:hover{opacity:1}

.container{max-width:1400px;margin:0 auto;padding:1.5rem;padding-bottom:5rem}

.stats-bar{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:1rem;
  margin-bottom:2rem;
}

.stat-card{
  background:#fff;
  border:1px solid var(--border);
  padding:1rem;
  border-radius:10px;
}

.stat-value{
  font-size:24px;
  font-weight:700;
  color:var(--copper);
  font-family:'JetBrains Mono',monospace;
}

.stat-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--ink3);
  margin-top:0.25rem;
}

.goal-card{
  background:linear-gradient(135deg, var(--copper), var(--gold));
  color:#fff;
  padding:1.25rem 1.5rem;
  border-radius:12px;
  margin-bottom:1.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:1rem;
  flex-wrap:wrap;
}

.goal-text{font-size:16px;font-family:'Libre Baskerville',serif}

.btn-add{
  background:rgba(255,255,255,0.25);
  border:2px solid rgba(255,255,255,0.4);
  color:#fff;
  padding:0.6rem 1.2rem;
  border-radius:8px;
  font-family:inherit;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
}

.btn-add:hover{background:rgba(255,255,255,0.35)}

.week-tabs{
  display:flex;
  gap:0.5rem;
  margin-bottom:1.5rem;
  overflow-x:auto;
  padding-bottom:0.5rem;
}

.week-tab{
  padding:0.75rem 1.25rem;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  color:var(--ink2);
  white-space:nowrap;
  min-width:140px;
}

.week-tab.active{background:var(--forest);color:#fff;border-color:var(--forest)}

.week-tab-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  color:var(--copper);
  display:block;
  text-transform:uppercase;
}

.week-tab.active .week-tab-label{color:var(--gold)}

.week-tab-title{display:block;font-size:14px;margin-top:0.25rem}

.columns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.5rem;
}

@media(max-width:768px){
  .columns{grid-template-columns:1fr}
}

.column{
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  overflow:hidden;
}

.column-header{
  padding:1.25rem;
  background:rgba(193,127,74,0.05);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.column-title{display:flex;align-items:center;gap:0.75rem}

.user-avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:700;
  font-family:'Libre Baskerville',serif;
  font-size:18px;
}

.user-avatar.dani{background:linear-gradient(135deg, var(--pink), var(--copper))}
.user-avatar.mauricio{background:linear-gradient(135deg, var(--blue), var(--forest))}

.column-name{
  font-family:'Libre Baskerville',serif;
  font-size:20px;
  color:var(--forest);
}

.column-role{font-size:11px;color:var(--ink3);text-transform:uppercase}

.column-progress{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--copper);
  font-weight:700;
}

.section-header{
  padding:0.75rem 1.25rem;
  background:rgba(193,127,74,0.04);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--copper);
  font-weight:700;
  border-bottom:1px solid var(--border);
}

.task{
  padding:0.85rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:flex-start;
  gap:0.75rem;
  cursor:pointer;
  user-select:none;
}

.task:last-child{border-bottom:none}
.task:hover{background:rgba(193,127,74,0.03)}

.task-check{
  width:22px;
  height:22px;
  border:2px solid var(--copper);
  border-radius:5px;
  flex-shrink:0;
  margin-top:1px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  color:transparent;
  font-weight:700;
  font-size:14px;
}

.task.done .task-check{
  background:var(--success);
  border-color:var(--success);
  color:#fff;
}

.task.done .task-text{
  text-decoration:line-through;
  color:var(--ink3);
}

.task-content{flex:1;min-width:0}
.task-text{font-size:13px;line-height:1.5}

.task-badge{
  display:inline-block;
  background:rgba(193,127,74,0.15);
  color:var(--copper);
  font-size:9px;
  padding:0.1rem 0.4rem;
  border-radius:3px;
  font-weight:700;
  margin-left:0.4rem;
  font-family:'JetBrains Mono',monospace;
}

.task-date{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--success);
  margin-top:0.3rem;
  display:none;
}

.task.done .task-date{display:block}

.task-delete{
  opacity:0;
  background:transparent;
  border:none;
  color:var(--danger);
  cursor:pointer;
  padding:0.25rem 0.5rem;
  border-radius:4px;
  font-size:16px;
  transition:opacity 0.2s;
}

.task:hover .task-delete{opacity:0.6}
.task-delete:hover{opacity:1!important;background:rgba(220,38,38,0.1)}

.empty{
  padding:2rem 1.25rem;
  text-align:center;
  color:var(--ink3);
  font-size:13px;
  font-style:italic;
}

.loading{
  text-align:center;
  padding:3rem;
  color:var(--ink2);
}

.spinner{
  display:inline-block;
  width:28px;
  height:28px;
  border:3px solid var(--border);
  border-top-color:var(--copper);
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:1rem;
}

@keyframes spin{to{transform:rotate(360deg)}}

.error-box{
  background:rgba(220,38,38,0.1);
  border:1px solid var(--danger);
  border-left:4px solid var(--danger);
  padding:1.25rem;
  border-radius:8px;
  margin-bottom:1rem;
  color:var(--ink);
  font-size:14px;
}

.error-box strong{color:var(--danger);display:block;margin-bottom:0.5rem}
.error-box code{background:rgba(0,0,0,0.05);padding:0.1rem 0.4rem;border-radius:3px;font-size:12px}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
}

.modal.open{display:flex}

.modal-content{
  background:#fff;
  border-radius:12px;
  padding:2rem;
  max-width:500px;
  width:100%;
}

.modal-content h2{
  font-family:'Libre Baskerville',serif;
  font-size:22px;
  color:var(--forest);
  margin-bottom:1.25rem;
}

.modal-content label{
  display:block;
  font-size:12px;
  font-weight:700;
  color:var(--forest);
  margin-bottom:0.4rem;
  margin-top:1rem;
  text-transform:uppercase;
}

.modal-content input,
.modal-content select,
.modal-content textarea{
  width:100%;
  padding:0.7rem;
  border:2px solid var(--border);
  border-radius:6px;
  font-family:inherit;
  font-size:14px;
}

.modal-content textarea{min-height:70px;resize:vertical}

.modal-actions{display:flex;gap:0.75rem;margin-top:1.5rem}

.btn{
  flex:1;
  padding:0.8rem;
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
}

.btn-primary{background:var(--forest);color:#fff}
.btn-secondary{background:transparent;color:var(--ink2);border:2px solid var(--border)}

.toast{
  position:fixed;
  bottom:1.5rem;
  right:1.5rem;
  background:#fff;
  border-left:4px solid var(--success);
  padding:0.75rem 1.25rem;
  border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
  font-size:13px;
  z-index:200;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.3s;
}

.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-left-color:var(--danger);color:var(--danger)}
</style>
</head>

<div class="header">

</div>

  <div id="loading" class="loading">

    <div>Conectando ao Supabase...</div>
  </div>

  <div id="content" style="display:none">
    <div class="columns">
      <div class="column" id="col-dani">
        <div class="column-header">
          <div class="column-title">
            <div class="user-avatar dani">D</div>

      <div class="column" id="col-mauricio">

          </div>
          <div class="column-progress" id="progress-mauricio">0/0</div>
        </div>
        <div id="tasks-mauricio"></div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modalAdd">
  <div class="modal-content">
    <h2>+ Nova Tarefa</h2>

    <label>Responsável</label>
    <select id="inUser">
      <option value="dani">Daniela</option>
      <option value="mauricio">Maurício</option>
    </select>

    <label>Semana</label>
    <select id="inWeek">
      <option value="1">Semana 1</option>
      <option value="2">Semana 2</option>
      <option value="3">Semana 3</option>
      <option value="4">Semana 4</option>

    <label>Categoria</label>

    <label>Descrição</label>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancel">Cancelar</button>
      <button class="btn btn-primary" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- DEBUG -->
<div id="debugPanel"></div>
<button id="debugToggle" type="button">🐛 Debug</button>

// ============================================
// STATE
// ============================================
const state = {
  supabase: null,
  week: 1,
  user: 'both',
  taskStatus: {}, // { id: { done, completedAt } }
  customTasks: [] // [{ id, week, user, section, text }]
};

// ============================================
// HELPERS
// ============================================
function $(id){return document.getElementById(id)}

function slugify(str){
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 50);
}

function makeId(week, user, section, idx){
  return 'default-w' + week + '-' + user + '-' + slugify(section) + '-' + idx;
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

function showToast(msg, isError){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function showError(title, msg){
  const box = $('errorBox');
  box.style.display = 'block';
  box.className = 'error-box';
  box.innerHTML = '<strong>' + title + '</strong>' + msg;
}

// ============================================
// SUPABASE - LOAD DATA
// ============================================
async function loadData(){
  DEBUG.log('Iniciando loadData...');

  try {
    if(!state.supabase){
      DEBUG.error('Cliente Supabase não está inicializado!');
      throw new Error('Cliente Supabase não inicializado');
    }

    DEBUG.log('Fazendo SELECT em legaci_tasks...');
    const { data, error } = await state.supabase
      .from('legaci_tasks')
      .select('*');

    if(error){
      DEBUG.error('Erro no SELECT: ' + JSON.stringify(error));
      throw error;
    }

    DEBUG.success('Dados carregados: ' + (data ? data.length : 0) + ' registros');

    state.taskStatus = {};
    state.customTasks = [];

    if(data){
      data.forEach(row => {
        state.taskStatus[row.id] = {
          done: row.done,
          completedAt: row.completed_at
        };

        if(row.id && row.id.indexOf('custom-') === 0){
          state.customTasks.push({
            id: row.id,
            week: row.week,
            user: row.user_owner,
            section: row.section,
            text: row.text
          });
        }
      });
    }

    DEBUG.success('State atualizado. Renderizando...');

    $('loading').style.display = 'none';
    $('content').style.display = 'block';

    render();
    showToast('✓ Conectado!');

  } catch(err) {
    DEBUG.error('FALHA: ' + err.message);
    $('loading').style.display = 'none';
    showError('Erro ao conectar com Supabase', `
      <p>${err.message || 'Erro desconhecido'}</p>
      <p style="margin-top:0.75rem;font-size:13px">
        <strong>Possíveis causas:</strong><br>
        1. Tabela <code>legaci_tasks</code> não foi criada<br>
        2. Policies de RLS estão bloqueando acesso<br>
        3. URL ou Key do Supabase está errada
      </p>
      <p style="margin-top:0.75rem;font-size:13px">
        <strong>SQL para criar a tabela:</strong>
      </p>
      <pre style="background:#fff;padding:0.75rem;border-radius:4px;font-size:11px;overflow-x:auto;margin-top:0.5rem">CREATE TABLE IF NOT EXISTS legaci_tasks (
  id TEXT PRIMARY KEY,
  done BOOLEAN DEFAULT FALSE,
  completed_at TIMESTAMPTZ,
  user_owner TEXT NOT NULL,
  week INTEGER NOT NULL,
  section TEXT NOT NULL,
  text TEXT NOT NULL,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

ALTER TABLE legaci_tasks ENABLE ROW LEVEL SECURITY;

DROP POLICY IF EXISTS "open_all" ON legaci_tasks;
CREATE POLICY "open_all" ON legaci_tasks
  FOR ALL USING (true) WITH CHECK (true);</pre>
    `);
  }
}

// ============================================
// TOGGLE TASK
// ============================================
async function toggleTask(taskData){
  const id = taskData.id;
  const isDone = !(state.taskStatus[id] && state.taskStatus[id].done);
  const completedAt = isDone ? new Date().toISOString() : null;

  DEBUG.log('Toggle: ' + id + ' → ' + (isDone ? 'DONE' : 'undone'));

  // UI otimista
  state.taskStatus[id] = { done: isDone, completedAt: completedAt };
  render();

  try {
    const { error } = await state.supabase
      .from('legaci_tasks')
      .upsert({
        id: id,
        done: isDone,
        completed_at: completedAt,
        user_owner: taskData.user,
        week: taskData.week,
        section: taskData.section,
        text: taskData.text
      });

    if(error) throw error;

    DEBUG.success('Salvo!');
    showToast(isDone ? '✓ Concluída!' : '↩ Desmarcada');
  } catch(err) {
    DEBUG.error('Erro ao salvar: ' + err.message);
    // Reverter
    state.taskStatus[id] = { done: !isDone, completedAt: null };
    render();
    showToast('Erro: ' + err.message, true);
  }
}

// ============================================
// ADD CUSTOM TASK
// ============================================
async function addTask(){
  const user = $('inUser').value;
  const week = parseInt($('inWeek').value);
  const section = $('inSection').value.trim() || 'Tarefas Extras';
  const text = $('inText').value.trim();

  if(!text){
    alert('Escreva a descrição da tarefa!');
    return;
  }

  const id = 'custom-w' + week + '-' + user + '-' + slugify(section) + '-' + Date.now();

  DEBUG.log('Adicionando: ' + id);

  try {
    const { error } = await state.supabase
      .from('legaci_tasks')
      .insert({
        id: id,
        done: false,
        completed_at: null,
        user_owner: user,
        week: week,
        section: section,
        text: text
      });

    if(error) throw error;

    state.customTasks.push({ id, week, user, section, text });
    state.taskStatus[id] = { done: false, completedAt: null };

    $('modalAdd').classList.remove('open');
    $('inText').value = '';

    if(week !== state.week){
      state.week = week;
      document.querySelectorAll('.week-tab').forEach(t => {
        t.classList.toggle('active', parseInt(t.dataset.week) === week);
      });
    }

    render();
    DEBUG.success('Tarefa adicionada!');
    showToast('✓ Tarefa criada!');
  } catch(err) {
    DEBUG.error('Erro ao adicionar: ' + err.message);
    alert('Erro: ' + err.message);
  }
}

// ============================================
// DELETE CUSTOM TASK
// ============================================
async function deleteTask(id){
  if(!confirm('Remover essa tarefa?')) return;

  DEBUG.log('Deletando: ' + id);

  try {
    const { error } = await state.supabase
      .from('legaci_tasks')
      .delete()
      .eq('id', id);

    if(error) throw error;

    state.customTasks = state.customTasks.filter(t => t.id !== id);
    delete state.taskStatus[id];

    render();
    DEBUG.success('Removido!');
    showToast('✓ Removida');
  } catch(err) {
    DEBUG.error('Erro ao remover: ' + err.message);
    showToast('Erro: ' + err.message, true);
  }
}

// ============================================
// RENDER
// ============================================
function render(){
  DEBUG.log('Render: semana=' + state.week + ', user=' + state.user);

  const showDani = state.user === 'both' || state.user === 'dani';
  const showMauricio = state.user === 'both' || state.user === 'mauricio';

  $('col-dani').style.display = showDani ? 'block' : 'none';
  $('col-mauricio').style.display = showMauricio ? 'block' : 'none';

  document.querySelector('.columns').style.gridTemplateColumns =
    (showDani && showMauricio) ? '1fr 1fr' : '1fr';

  renderColumn('dani');
  renderColumn('mauricio');
  updateStats();
}

function renderColumn(user){
  const container = $('tasks-' + user);
  container.innerHTML = '';

  let total = 0, done = 0;

  // Tarefas padrão
  const weekTasks = TASKS[state.week] && TASKS[state.week][user];
  if(weekTasks){
    weekTasks.forEach(section => {
      const sectionEl = document.createElement('div');

      const header = document.createElement('div');
      header.className = 'section-header';
      header.textContent = section.name;
      sectionEl.appendChild(header);

      section.items.forEach((text, idx) => {
        const id = makeId(state.week, user, section.name, idx);
        const status = state.taskStatus[id] || { done: false, completedAt: null };
        total++;
        if(status.done) done++;

        const taskEl = makeTaskElement({
          id: id,
          week: state.week,
          user: user,
          section: section.name,
          text: text,
          done: status.done,
          completedAt: status.completedAt,
          isCustom: false
        });

        sectionEl.appendChild(taskEl);
      });

      container.appendChild(sectionEl);
    });
  }

  // Tarefas customizadas dessa semana/user
  const userCustom = state.customTasks.filter(t =>
    t.week === state.week && t.user === user
  );

  if(userCustom.length > 0){
    const groups = {};
    userCustom.forEach(t => {
      if(!groups[t.section]) groups[t.section] = [];
      groups[t.section].push(t);
    });

    Object.keys(groups).forEach(sectionName => {
      const sectionEl = document.createElement('div');

      const header = document.createElement('div');
      header.className = 'section-header';
      header.textContent = '⭐ ' + sectionName;
      sectionEl.appendChild(header);

      groups[sectionName].forEach(task => {
        const status = state.taskStatus[task.id] || { done: false, completedAt: null };
        total++;
        if(status.done) done++;

        const taskEl = makeTaskElement({
          id: task.id,
          week: task.week,
          user: task.user,
          section: task.section,
          text: task.text,
          done: status.done,
          completedAt: status.completedAt,
          isCustom: true
        });

        sectionEl.appendChild(taskEl);
      });

      container.appendChild(sectionEl);
    });
  }

  $('progress-' + user).textContent = done + '/' + total;
}

function makeTaskElement(task){
  const li = document.createElement('div');
  li.className = 'task' + (task.done ? ' done' : '');

  const check = document.createElement('div');
  check.className = 'task-check';
  check.textContent = '✓';

  const content = document.createElement('div');
  content.className = 'task-content';

  const textEl = document.createElement('div');
  textEl.className = 'task-text';
  textEl.textContent = task.text;

  if(task.isCustom){
    const badge = document.createElement('span');
    badge.className = 'task-badge';
    badge.textContent = 'CUSTOM';
    textEl.appendChild(badge);
  }

  content.appendChild(textEl);

  if(task.completedAt){
    const dateEl = document.createElement('div');
    dateEl.className = 'task-date';
    dateEl.textContent = '✓ ' + formatDate(task.completedAt);
    content.appendChild(dateEl);
  }

  // Click handler — em todo o elemento
  li.addEventListener('click', function(e){
    if(e.target.classList.contains('task-delete')) return;
    toggleTask({
      id: task.id,
      week: task.week,
      user: task.user,
      section: task.section,
      text: task.text
    });
  });

  li.appendChild(check);
  li.appendChild(content);

  if(task.isCustom){
    const del = document.createElement('button');
    del.className = 'task-delete';
    del.textContent = '×';
    del.type = 'button';
    del.title = 'Remover';
    del.addEventListener('click', function(e){
      e.stopPropagation();
      deleteTask(task.id);
    });
    li.appendChild(del);
  }

  return li;
}

function updateStats(){
  let total = 0, done = 0;
  let dTotal = 0, dDone = 0;
  let mTotal = 0, mDone = 0;

  // Padrão
  Object.keys(TASKS).forEach(w => {
    const week = parseInt(w);
    ['dani', 'mauricio'].forEach(u => {
      TASKS[w][u].forEach(s => {
        s.items.forEach((text, idx) => {
          const id = makeId(week, u, s.name, idx);
          const status = state.taskStatus[id] || { done: false };
          total++;
          if(status.done) done++;
          if(u === 'dani'){ dTotal++; if(status.done) dDone++; }
          else { mTotal++; if(status.done) mDone++; }
        });
      });
    });
  });

  // Custom
  state.customTasks.forEach(t => {
    const status = state.taskStatus[t.id] || { done: false };
    total++;
    if(status.done) done++;
    if(t.user === 'dani'){ dTotal++; if(status.done) dDone++; }
    else { mTotal++; if(status.done) mDone++; }
  });

  const pct = total ? Math.round((done/total)*100) : 0;
  const dPct = dTotal ? Math.round((dDone/dTotal)*100) : 0;
  const mPct = mTotal ? Math.round((mDone/mTotal)*100) : 0;

  $('statTotal').textContent = pct + '%';
  $('statDani').textContent = dPct + '%';
  $('statMauricio').textContent = mPct + '%';
  $('statDone').textContent = done + '/' + total;
}

// ============================================
// INIT
// ============================================
function setupEvents(){
  DEBUG.log('Configurando event listeners...');

  // Week tabs
  document.querySelectorAll('.week-tab').forEach(btn => {
    btn.addEventListener('click', function(){
      const week = parseInt(this.dataset.week);
      DEBUG.log('Click week: ' + week);
      state.week = week;
      document.querySelectorAll('.week-tab').forEach(t => {
        t.classList.toggle('active', parseInt(t.dataset.week) === week);
      });
      render();
    });
  });

  // User tabs
  document.querySelectorAll('.user-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      const user = this.dataset.user;
      DEBUG.log('Click user: ' + user);
      state.user = user;
      document.querySelectorAll('.user-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.user === user);
      });
      render();
    });
  });

  // Add button
  $('btnAdd').addEventListener('click', function(){
    DEBUG.log('Abrindo modal de adicionar');
    $('inUser').value = state.user === 'mauricio' ? 'mauricio' : 'dani';
    $('inWeek').value = state.week;
    $('inSection').value = 'Tarefas Extras';
    $('inText').value = '';
    $('modalAdd').classList.add('open');
  });

  $('btnCancel').addEventListener('click', function(){
    $('modalAdd').classList.remove('open');
  });

  $('btnSave').addEventListener('click', addTask);

  $('modalAdd').addEventListener('click', function(e){
    if(e.target.id === 'modalAdd') this.classList.remove('open');
  });

  // Debug toggle
  $('debugToggle').addEventListener('click', function(){
    const panel = $('debugPanel');
    panel.classList.toggle('visible');
    this.textContent = panel.classList.contains('visible') ? '🐛 Esconder' : '🐛 Debug';
  });

  DEBUG.success('Event listeners OK');
}

function init(){
  DEBUG.log('=== INICIANDO APP ===');

  // Verifica se Supabase carregou
  if(typeof window.supabase === 'undefined' || !window.supabase.createClient){
    DEBUG.error('Biblioteca Supabase NÃO carregou!');
    $('loading').style.display = 'none';
    showError('Biblioteca Supabase não carregou',
      '<p>Verifique sua conexão de internet. A biblioteca não foi baixada do CDN.</p>'
    );
    return;
  }

  DEBUG.success('Biblioteca Supabase OK');

  try {
    state.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    DEBUG.success('Cliente Supabase criado');

    setupEvents();
    loadData();
  } catch(err) {
    DEBUG.error('Erro no init: ' + err.message);
    $('loading').style.display = 'none';
    showError('Erro ao inicializar', '<p>' + err.message + '</p>');
  }
}

// Iniciar quando DOM estiver pronto
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
